<!doctype html>
<html>
  <body style="margin:0;background:#f8fafc;font-family:Inter,Arial,sans-serif;color:#0f172a;">
    <div style="padding:32px 16px;">
      <div style="max-width:680px;margin:0 auto;border:1px solid #e2e8f0;border-radius:24px;overflow:hidden;background:#ffffff;">
        <div style="text-align:center;padding:32px;border-bottom:1px solid #e2e8f0;">
          <img src="../src/assets/logo.png" alt="Playa Escondida Vacation Homes" style="height:80px;object-fit:contain;margin:0 auto;" />
        </div>
        <div style="padding:32px;">
          <h2 style="margin-top:0;">Monthly Owner Statement</h2>
          <p><strong>Owner:</strong> {{owner_name}}</p>
          <p><strong>Month:</strong> {{statement_month}}</p>
          <p><strong>Gross bookings:</strong> {{gross_bookings}}</p>
          <p><strong>Management fee:</strong> {{management_fee}}</p>
          <p><strong>Payout:</strong> {{owner_payout}}</p>
        </div>
      </div>
    </div>
  </body>
</html>
